<!doctype html>
<html lang="en" data-request-timeout-ms="{{ ui_request_timeout_ms }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GarageBand AI Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=asset_version) }}" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>GarageBand AI Agent</h1>
        <p class="sub">How can I help with your song today?</p>
        <div id="chat" class="chat"></div>
        <p id="status" class="status"></p>
        <div class="row">
          <input id="messageInput" type="text" placeholder="Message GarageBand AI Agent..." />
          <button id="sendBtn">Send</button>
        </div>
        <div class="row controls">
          <button id="micBtn">Start Mic</button>
          <button id="resetBtn" class="secondary">Reset Chat</button>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js', v=asset_version) }}"></script>
  </body>
</html>
